services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commission-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/config:/app/config:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: commission-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
