<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<link rel="icon" href="data:,">
<title>登录 · 莱莎方舟</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;
  background:radial-gradient(circle at 20% 0%,#1f1a30 0%,#0a0a0f 55%,#050507 100%);
  color:#f0f0f5;-webkit-font-smoothing:antialiased;overflow:hidden;
  padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
input,button{font-family:inherit;outline:none;border:none}
button{cursor:pointer}

.bg-deco{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.bg-deco::before{content:'';position:absolute;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,110,.18) 0%,rgba(212,175,110,0) 70%);
  top:-220px;right:-180px;filter:blur(20px)}
.bg-deco::after{content:'';position:absolute;width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(122,90,200,.12) 0%,rgba(122,90,200,0) 70%);
  bottom:-150px;left:-160px;filter:blur(20px)}

.wrap{position:relative;z-index:2;min-height:100%;display:flex;flex-direction:column;
  padding:48px 28px 36px;max-width:480px;margin:0 auto}

.brand{margin-top:24px}
.brand-logo{font-size:32px;font-weight:700;font-style:italic;color:#d4af6e;letter-spacing:.5px}
.brand-sub{margin-left:8px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.2em}
.brand-title{margin-top:18px;font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.3}
.brand-desc{margin-top:8px;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:.05em}

.card{margin-top:48px;padding:28px 22px 22px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(212,175,110,.05),0 20px 60px rgba(0,0,0,.4)}
.card h2{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.card p.sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:22px}

.field{position:relative;margin-bottom:14px}
.field .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:rgba(255,255,255,.4);pointer-events:none}
.field input{width:100%;height:48px;padding:0 44px 0 42px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;color:#fff;font-size:15px;
  transition:border-color .2s,background .2s}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field input:focus{border-color:#d4af6e;background:rgba(212,175,110,.05)}
.field .toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.35);background:transparent}
.field .toggle:active{color:rgba(255,255,255,.7)}
.field .toggle svg{width:18px;height:18px}

.row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;margin-bottom:18px}
.remember{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer}
.remember .box{width:16px;height:16px;border:1px solid rgba(255,255,255,.3);border-radius:4px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.remember.on .box{background:#d4af6e;border-color:#d4af6e}
.remember.on .box::after{content:'';width:8px;height:4px;border-left:2px solid #0a0a0f;border-bottom:2px solid #0a0a0f;transform:rotate(-45deg) translate(1px,-1px)}

.btn{width:100%;height:48px;border-radius:10px;font-size:15px;font-weight:600;
  background:linear-gradient(135deg,#d4af6e 0%,#c19a59 100%);color:#0a0a0f;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 20px rgba(212,175,110,.25);
  transition:transform .15s,box-shadow .2s,opacity .2s}
.btn:active{transform:translateY(1px);box-shadow:0 4px 12px rgba(212,175,110,.2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn .spin{width:16px;height:16px;border:2px solid rgba(10,10,15,.25);border-top-color:#0a0a0f;
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{margin-top:12px;padding:10px 12px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);
  border-radius:8px;color:#fca5a5;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.error svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}

.foot{margin-top:auto;padding-top:32px;text-align:center}
.foot .desktop-link{display:inline-block;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.1);border-radius:18px}
.foot .desktop-link:active{color:#d4af6e;border-color:rgba(212,175,110,.3)}
.foot .copy{margin-top:14px;font-size:11px;color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="bg-deco"></div>

<div class="wrap">
  <div class="brand">
    <span class="brand-logo">LeShine</span>
    <span class="brand-sub">ARK PLATFORM</span>
    <h1 class="brand-title">莱莎方舟综合管理平台</h1>
    <p class="brand-desc">LeShine Hair Management Platform</p>
  </div>

  <form class="card" id="loginForm" novalidate>
    <h2>欢迎登录</h2>
    <p class="sub">请输入您的账号信息</p>

    <div class="field">
      <svg class="ico" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" required>
    </div>

    <div class="field">
      <svg class="ico" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
      <button type="button" class="toggle" id="togglePwd" aria-label="切换显示">
        <svg id="iconEyeOn" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 12C3.7 7.9 7.5 5 12 5s8.3 2.9 9.5 7c-1.2 4.1-5 7-9.5 7s-8.3-2.9-9.5-7z"/>
        </svg>
        <svg id="iconEyeOff" style="display:none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.9 18.8A10 10 0 0112 19c-4.5 0-8.3-2.9-9.5-7a10 10 0 011.6-3M9.9 9.9a3 3 0 014.2 4.2M9.9 9.9l4.2 4.2M9.9 9.9L6.6 6.6m7.5 7.5l3.3 3.3M3 3l18 18"/>
        </svg>
      </button>
    </div>

    <div class="row">
      <label class="remember" id="rememberLabel">
        <span class="box"></span>
        <span>记住登录状态</span>
      </label>
    </div>

    <button class="btn" type="submit" id="submitBtn">
      <span class="spin" id="spin" style="display:none"></span>
      <span id="btnText">登 录</span>
    </button>

    <div class="error" id="errorBox" style="display:none">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span id="errorText"></span>
    </div>
  </form>

  <div class="foot">
    <a class="desktop-link" id="desktopLink" href="javascript:void(0)">切换到完整版</a>
    <div class="copy">© 2026 LeShine Co., Ltd.</div>
  </div>
</div>

<script>
(function(){
  var form = document.getElementById('loginForm');
  var usernameEl = document.getElementById('username');
  var passwordEl = document.getElementById('password');
  var btn = document.getElementById('submitBtn');
  var btnText = document.getElementById('btnText');
  var spin = document.getElementById('spin');
  var errorBox = document.getElementById('errorBox');
  var errorText = document.getElementById('errorText');
  var togglePwd = document.getElementById('togglePwd');
  var iconEyeOn = document.getElementById('iconEyeOn');
  var iconEyeOff = document.getElementById('iconEyeOff');
  var rememberLabel = document.getElementById('rememberLabel');
  var desktopLink = document.getElementById('desktopLink');

  var remember = localStorage.getItem('m_remember_login') === '1';
  function syncRemember(){
    if (remember) rememberLabel.classList.add('on');
    else rememberLabel.classList.remove('on');
  }
  syncRemember();
  rememberLabel.addEventListener('click', function(){
    remember = !remember;
    syncRemember();
  });

  // 已登录则直接进 /m/
  var existing = localStorage.getItem('ark_access_token');
  if (existing) {
    location.replace('/m/');
    return;
  }

  togglePwd.addEventListener('click', function(){
    var isPwd = passwordEl.type === 'password';
    passwordEl.type = isPwd ? 'text' : 'password';
    iconEyeOn.style.display = isPwd ? 'none' : '';
    iconEyeOff.style.display = isPwd ? '' : 'none';
  });

  desktopLink.addEventListener('click', function(){
    sessionStorage.setItem('ark_desktop_mode', '1');
    location.href = '/login';
  });

  function showError(msg){
    errorText.textContent = msg || '登录失败，请检查用户名和密码';
    errorBox.style.display = 'flex';
  }
  function hideError(){ errorBox.style.display = 'none'; }
  function setLoading(on){
    btn.disabled = on;
    spin.style.display = on ? '' : 'none';
    btnText.textContent = on ? '登 录 中...' : '登 录';
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    hideError();
    var username = usernameEl.value.trim();
    var password = passwordEl.value;
    if (!username || !password) {
      showError('请输入用户名和密码');
      return;
    }
    setLoading(true);
    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username: username, password: password })
    }).then(function(res){
      return res.json().then(function(data){ return { ok: res.ok, status: res.status, data: data }; });
    }).then(function(r){
      if (!r.ok) {
        var msg = (r.data && (r.data.detail || r.data.message)) ||
          (r.status === 401 ? '用户名或密码错误'
           : r.status === 403 ? '账号已被禁用，请联系管理员'
           : r.status === 423 ? '账号已锁定，请稍后再试'
           : '登录失败 (' + r.status + ')');
        throw new Error(msg);
      }
      var token = r.data && r.data.access_token;
      if (!token) throw new Error('登录响应缺少 token');
      localStorage.setItem('ark_access_token', token);
      localStorage.setItem('m_remember_login', remember ? '1' : '0');
      // 进入移动端 SPA
      location.replace('/m/');
    }).catch(function(err){
      showError(err && err.message ? err.message : '登录失败，请稍后重试');
      setLoading(false);
    });
  });
})();
</script>
</body>
</html>
