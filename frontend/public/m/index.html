<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>莱莎方舟 · 素材管理</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1677ff;--primary-light:rgba(22,119,255,.1);--gold:#f59e0b;--red:#dc2626;--green:#16a34a;--gray:#6b7280;--gray-light:#9ca3af;--disabled:#d1d5db;--bg:#f5f5f5;--card:#fff;--border:#e5e7eb;--text:#111827;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;border:none}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ===== 布局 ===== */
.app{min-height:100vh;padding-bottom:calc(56px + env(safe-area-inset-bottom,0px));position:relative}
.pb56{padding-bottom:calc(56px + env(safe-area-inset-bottom,0px))}

/* 顶部导航 */
.header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;height:44px}
.header .back{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text)}
.header .title{flex:1;text-align:center;font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}
.header .right{width:auto;text-align:right;display:flex;align-items:center;gap:8px}
.header .switch-link{font-size:12px;color:var(--primary);padding:4px 8px;border:1px solid var(--primary);border-radius:4px;white-space:nowrap}

/* 底部导航 */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--gray);font-size:10px;text-decoration:none;transition:all .15s}
.nav-item i{font-size:22px;line-height:1;font-style:normal;display:block}
.nav-item.on{color:var(--primary);font-weight:500}

/* ===== 搜索页 ===== */
.search-box{padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.search-input{position:relative}
.search-input input{width:100%;padding:10px 36px 10px 36px;background:var(--bg);border-radius:8px;font-size:15px;color:var(--text)}
.search-input input::placeholder{color:var(--gray-light)}
.search-input .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--gray)}
.search-input .clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:14px;background:var(--border);border-radius:50%}

/* chip条 */
.chips-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:80}
.chips-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:12px;background:var(--bg);color:var(--gray);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip .arrow{font-size:8px;opacity:.7}

/* 已选筛选 */
.filters-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px}
.filter-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;background:var(--primary-light);color:var(--primary)}
.filter-pill .x{font-size:12px;margin-left:2px}
.clear-all{color:var(--gray);font-size:12px;padding:3px 8px}

/* ===== 卡片网格 ===== */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.card{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:var(--sh);position:relative;border:1px solid var(--border)}
.card-thumb{position:relative;padding-top:75%;background:var(--bg);overflow:hidden}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-thumb .video-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-size:36px}
.card-thumb .doc-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.card-thumb .doc-bg i{font-size:36px;color:var(--gray-light);font-style:normal}
.card-thumb .duration{position:absolute;top:6px;left:6px;padding:2px 6px;background:rgba(255,255,255,.9);border-radius:4px;font-size:11px;font-weight:500;color:var(--text)}
.card-thumb .status{position:absolute;top:6px;left:6px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.status-latest{background:rgba(22,163,74,.1);color:var(--green)}
.status-history{background:rgba(107,114,128,.1);color:var(--gray)}
.status-offline{background:rgba(220,38,38,.1);color:var(--red)}
.card-thumb .fav-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.85);border-radius:50%;font-size:16px;z-index:3}
.card-thumb .fav-btn.on{color:var(--gold)}
.card-info{padding:8px}
.card-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-tags{font-size:11px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-actions{display:flex;border-top:1px solid var(--border)}
.card-actions button{flex:1;padding:8px 0;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.card-actions .btn-copy{background:var(--primary-light);color:var(--primary);font-weight:500}
.card-actions .btn-dl{color:var(--gray)}

/* 卡片操作栏（覆盖在图上） */
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:6px;display:flex;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.5))}
.card-overlay button{flex:1;padding:5px 0;border-radius:4px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:3px}
.card-overlay .btn-cp{background:var(--primary);color:#fff}
.card-overlay .btn-d{color:rgba(255,255,255,.9);background:rgba(255,255,255,.2)}

/* 失效卡片 */
.card.invalid{opacity:.45}
.card.invalid .invalid-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4}
.card.invalid .invalid-badge span{padding:4px 12px;background:rgba(0,0,0,.6);color:#fff;border-radius:12px;font-size:12px}

/* ===== 收藏页 ===== */
.fav-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.fav-header h2{font-size:17px;font-weight:600}
.fav-header .btn-new{padding:5px 12px;background:var(--primary);color:#fff;border-radius:6px;font-size:13px;font-weight:500}

/* 收藏夹tabs */
.fav-tabs{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.fav-tabs::-webkit-scrollbar{display:none}
.fav-tab{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:13px;background:var(--bg);color:var(--gray);border:1px solid var(--border);cursor:pointer;transition:all .15s;white-space:nowrap}
.fav-tab.on{background:var(--primary-light);color:var(--primary);border-color:var(--primary);font-weight:500}

/* 新建收藏夹 */
.new-folder{padding:12px;display:flex;gap:8px;background:var(--card);border-bottom:1px solid var(--border)}
.new-folder input{flex:1;padding:8px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--border);font-size:14px}
.new-folder .btn-ok{padding:8px 16px;background:var(--primary);color:#fff;border-radius:6px;font-size:13px}
.new-folder .btn-cancel{padding:8px 12px;color:var(--gray);font-size:13px}

/* ===== 最近使用页 ===== */
.recent-header{padding:12px;background:var(--card);border-bottom:1px solid var(--border);font-size:17px;font-weight:600}
.recent-list{padding:0 12px}
.recent-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.recent-thumb{width:56px;height:56px;border-radius:8px;background:var(--bg);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.recent-thumb img{width:100%;height:100%;object-fit:cover}
.recent-thumb i{font-size:24px;color:var(--gray-light);font-style:normal}
.recent-info{flex:1;min-width:0}
.recent-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.recent-meta{font-size:12px;color:var(--gray);display:flex;gap:6px;align-items:center}
.recent-meta .copy-ln{color:var(--primary);font-size:12px;padding:2px 8px;background:var(--primary-light);border-radius:4px;cursor:pointer}

/* ===== 素材详情页 ===== */
.detail-page{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column}
.detail-media{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;touch-action:manipulation}
.detail-media img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .3s}
.detail-media .video-player{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:64px;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.detail-media .doc-preview{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
.detail-media .doc-preview i{font-size:80px;color:var(--gray-light);font-style:normal}
.detail-media .doc-preview .btn-open{padding:10px 24px;background:var(--primary);color:#fff;border-radius:6px;font-size:14px}
.detail-actions{height:56px;display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--card);border-top:1px solid var(--border)}
.detail-actions button{flex:1;height:40px;border-radius:6px;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.detail-actions .btn-copied{background:var(--green);color:#fff}
.detail-info{padding:16px;overflow-y:auto;flex:1}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.tag-item{padding:4px 10px;border-radius:4px;font-size:12px;background:var(--bg);color:var(--gray);border:1px solid var(--border)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)}
.info-row .label{color:var(--gray)}
.info-row .value{color:var(--text);font-weight:500}

/* 版本历史 */
.version-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.version-item.current .version-badge{background:var(--primary-light);color:var(--primary)}
.version-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--bg);color:var(--gray)}
.version-date{font-size:12px;color:var(--gray);margin-top:2px}

/* ===== Bottom Sheet ===== */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;opacity:0;animation:bsFadeIn .25s forwards}
@keyframes bsFadeIn{to{opacity:1}}
.bs-panel{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:16px 16px 0 0;z-index:301;max-height:70vh;display:flex;flex-direction:column;transform:translateY(100%);animation:bsSlideUp .3s forwards}
@keyframes bsSlideUp{to{transform:translateY(0)}}
.bs-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.bs-header h3{font-size:16px;font-weight:600}
.bs-header .bs-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:18px}
.bs-header .bs-clear{color:var(--gray);font-size:13px}
.bs-body{flex:1;overflow-y:auto;padding:8px 0}
.bs-option{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;cursor:pointer}
.bs-option:active{background:var(--bg)}
.bs-check{width:20px;height:20px;border:2px solid var(--disabled);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;flex-shrink:0}
.bs-option.on .bs-check{background:var(--primary);border-color:var(--primary);color:#fff}
.bs-color-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.bs-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.bs-footer button{flex:1;height:40px;border-radius:6px;font-size:14px;font-weight:500}
.bs-btn-primary{background:var(--primary);color:#fff}
.bs-btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}

/* 拖拽指示器 */
.bs-drag{height:20px;display:flex;align-items:center;justify-content:center;cursor:grab}
.bs-drag::before{content:'';width:36px;height:4px;background:var(--disabled);border-radius:2px}

/* ===== 长按菜单 ===== */
.ctx-menu{position:fixed;background:var(--card);border-radius:12px;box-shadow:var(--sh2);padding:4px;min-width:180px;z-index:600;animation:ctxIn .15s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;color:var(--text);cursor:pointer;border-radius:8px}
.ctx-item:active{background:var(--bg)}
.ctx-item.danger{color:var(--red)}

/* ===== Toast ===== */
.toast-container{position:fixed;top:12px;left:0;right:0;z-index:700;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{pointer-events:auto;padding:10px 20px;background:var(--card);border-radius:8px;box-shadow:var(--sh2);font-size:13px;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease}
.toast.success{border-left:3px solid var(--green);color:var(--green)}
.toast.error{border-left:3px solid var(--red);color:var(--red)}
.toast.info{border-left:3px solid var(--primary);color:var(--primary)}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* 底部Toast */
.toast-bottom{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));left:0;right:0;z-index:700;display:flex;justify-content:center;pointer-events:none}
.toast-bottom .toast{pointer-events:auto;background:rgba(0,0,0,.8);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px}

/* ===== 空状态 ===== */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;color:var(--disabled);margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--gray);margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--gray-light);margin-bottom:16px}
.empty-btn{padding:8px 20px;background:var(--primary);color:#fff;border-radius:6px;font-size:14px;font-weight:500}

/* ===== 骨架屏 ===== */
.skeleton{background:linear-gradient(90deg,var(--bg) 25%,#e8e8e8 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== 加载更多 ===== */
.load-more{padding:16px;text-align:center;font-size:12px;color:var(--gray-light)}

/* ===== 下拉刷新 ===== */
.pull-refresh{overflow-y:auto;-webkit-overflow-scrolling:touch}
.refresh-indicator{text-align:center;padding:12px;font-size:12px;color:var(--gray);transition:all .2s}

/* ===== 回到顶部 ===== */
.back-top{position:fixed;right:12px;bottom:calc(70px + env(safe-area-inset-bottom,0px));width:40px;height:40px;background:var(--card);border-radius:50%;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:18px;z-index:150}

/* 收藏夹选择弹层 */
.folder-select .bs-option{padding:14px 16px;border-bottom:1px solid var(--border)}
.folder-select .bs-option:last-child{border-bottom:none}

/* 切换到完整版条 */
.switch-bar{position:sticky;top:0;z-index:110;background:var(--primary-light);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;font-size:12px}
.switch-bar span{color:#8a6d3b}
.switch-bar a{color:var(--primary);font-weight:500;text-decoration:underline}

/* 登录引导 */
.login-guide{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-guide-content{text-align:center}
.login-guide-icon{font-size:56px;margin-bottom:16px}
.login-guide-content h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text)}
.login-guide-content p{font-size:14px;color:var(--gray);margin-bottom:24px}
.login-guide-btn{padding:12px 40px;background:var(--primary);color:#fff;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script src="vue.global.js"></script>
<script src="vue-router.global.js"></script>
<script>

const {createApp,ref,computed,reactive,watch,onMounted,onUnmounted,provide,inject}=Vue;
const {createRouter,createWebHashHistory,useRoute,useRouter}=VueRouter;

/* ==================== 配置 ==================== */
const API_BASE = '/api/assets';
const UPLOADS_BASE = '/uploads/assets';

/* 从 localStorage 获取 token */
function getToken() {
  return localStorage.getItem('ark_access_token') || sessionStorage.getItem('ark_access_token') || '';
}

/* 从主站同步 token */
function syncToken() {
  // 尝试从同源 localStorage 获取
  const token = localStorage.getItem('ark_access_token');
  if (!token) {
    // 如果独立打开，尝试通过 URL hash 或 cookie
    console.warn('未检测到登录态，请从方舟平台进入');
  }
  return token;
}

/* 构建缩略图完整 URL */
function thumbUrl(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  return UPLOADS_BASE + '/' + path.replace(/^\//, '');
}

/* 格式化文件大小 */
function fmtSize(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

/* 格式化日期 */
function fmtDate(iso) {
  if (!iso) return '';
  return iso.slice(0, 10);
}

/* 相对时间 */
function relativeTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  if (diff < 172800) return '昨天';
  return fmtDate(iso);
}

/* ==================== API 层 ==================== */
async function apiRequest(path, options = {}) {
  const token = getToken();
  const headers = {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    ...options.headers,
  };

  const url = API_BASE + path;
  const res = await fetch(url, {
    ...options,
    headers,
  });

  if (res.status === 401) {
    // Token 过期，尝试刷新或提示登录
    throw new Error('登录已过期，请重新登录');
  }

  const data = await res.json().catch(() => ({ code: res.status, message: '请求失败' }));

  if (data.code !== 200 && data.code !== 0 && data.code !== 201) {
    throw new Error(data.message || '请求失败');
  }
  return data;
}

const API = {
  async quickSearch(params = {}) {
    const qs = new URLSearchParams();
    if (params.keyword) qs.set('keyword', params.keyword);
    if (params.status) qs.set('status', params.status);
    if (params.page) qs.set('page', String(params.page));
    if (params.page_size) qs.set('page_size', String(params.page_size));
    if (params.tag_filters) qs.set('tag_filters', JSON.stringify(params.tag_filters));
    const r = await apiRequest('/quick-search?' + qs.toString());
    return r.data || {};
  },

  async getPopularTags() {
    const r = await apiRequest('/tags/popular');
    return r.data || [];
  },

  async getTags() {
    const r = await apiRequest('/tags/dimensions');
    return r.data || [];
  },

  async getAsset(id) {
    const r = await apiRequest('/' + id);
    return r.data || null;
  },

  async getShareLink(id, expires = 7200) {
    const r = await apiRequest('/' + id + '/share-link?expires=' + expires);
    return r.data || null;
  },

  async recordAction(id, action) {
    const r = await apiRequest('/' + id + '/actions', {
      method: 'POST',
      body: JSON.stringify({ action }),
    });
    return r;
  },

  async getRecent(limit = 30) {
    const r = await apiRequest('/recent?limit=' + limit);
    return r.data || [];
  },

  async getFavorites() {
    const r = await apiRequest('/favorites/folders');
    return r.data || [];
  },

  async createFavorite(name) {
    const r = await apiRequest('/favorites/folders', {
      method: 'POST',
      body: JSON.stringify({ name }),
    });
    return r.data || null;
  },

  async getFavoriteItems(folderId, page = 1, page_size = 20) {
    const r = await apiRequest('/favorites/folders/' + folderId + '/mobile-items?page=' + page + '&page_size=' + page_size);
    return r.data || {};
  },

  async addFavoriteItem(folderId, assetId) {
    const r = await apiRequest('/favorites/folders/' + folderId + '/items', {
      method: 'POST',
      body: JSON.stringify({ asset_id: assetId }),
    });
    return r.data || null;
  },

  async removeFavoriteByAsset(folderId, assetId) {
    const r = await apiRequest('/favorites/folders/' + folderId + '/items/by-asset/' + assetId, {
      method: 'DELETE',
    });
    return r;
  },

  async downloadAsset(assetId) {
    const token = getToken();
    const url = API_BASE + '/' + assetId + '/download';

};

/* ==================== Toast 系统 ==================== */
const ToastSymbol = Symbol();

function useToast() {
  return inject(ToastSymbol);
}

const ToastProvider = {
  setup() {
    const toasts = ref([]);
    const bottomToasts = ref([]);
    let id = 0;
    function show(msg, type = 'info', position = 'top') {
      const t = { id: ++id, msg, type, position };
      if (position === 'bottom') bottomToasts.value.push(t);
      else toasts.value.push(t);
      setTimeout(() => {
        if (position === 'bottom') bottomToasts.value = bottomToasts.value.filter(x => x.id !== t.id);
        else toasts.value = toasts.value.filter(x => x.id !== t.id);
      }, 1500);
    }
    provide(ToastSymbol, { show });
    return { toasts, bottomToasts };
  },
  template: `
    <div class="toast-container"><div v-for="t in toasts" :key="t.id" :class="['toast',t.type]">{{t.msg}}</div></div>
    <div class="toast-bottom" v-if="bottomToasts.length"><div v-for="t in bottomToasts" :key="t.id" class="toast">{{t.msg}}</div></div>
  `
};

/* ==================== BottomSheet 组件 ==================== */
const BottomSheet = {
  props: ['title', 'show', 'selected', 'options', 'multi', 'searchable'],
  emits: ['update:show', 'update:selected', 'confirm'],
  setup(props, { emit }) {
    const localSel = ref([]);
    const searchQ = ref('');
    watch(() => props.show, v => {
      if (v) {
        localSel.value = [...(props.selected || [])];
        searchQ.value = '';
      }
    });
    const isOn = v => localSel.value.includes(v);
    const toggle = v => {
      if (props.multi) {
        const i = localSel.value.indexOf(v);
        if (i >= 0) localSel.value.splice(i, 1); else localSel.value.push(v);
      } else { localSel.value = [v]; }
    };
    const clear = () => { localSel.value = []; };
    const confirm = () => { emit('update:selected', [...localSel.value]); emit('update:show', false); emit('confirm'); };
    const close = () => emit('update:show', false);
    const filteredOpts = computed(() => {
      let opts = props.options || [];
      if (searchQ.value.trim()) {
        const kw = searchQ.value.trim().toLowerCase();
        opts = opts.filter(o => (o.label || o.value || o).toLowerCase().includes(kw));
      }
      return opts;
    });
    return { localSel, isOn, toggle, clear, confirm, close, searchQ, filteredOpts };
  },
  template: `
    <div v-if="show" class="bs-overlay" @click="close"></div>
    <div v-if="show" class="bs-panel" @click.stop>
      <div class="bs-drag"></div>
      <div class="bs-header">
        <h3>{{title}}</h3>
        <span class="bs-clear" v-if="multi" @click="clear">清除</span>
        <span class="bs-close" @click="close">&#10005;</span>
      </div>
      <div v-if="searchable" class="bs-search" style="padding:8px 16px;border-bottom:1px solid var(--border)">
        <div class="search-input" style="position:relative">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gray)">&#128269;</span>
          <input v-model="searchQ" placeholder="搜索标签..." style="width:100%;padding:8px 10px 8px 32px;background:var(--bg);border-radius:6px;font-size:14px"/>
          <span v-if="searchQ" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:12px;background:var(--border);border-radius:50%" @click="searchQ=''">&#10005;</span>
        </div>
      </div>
      <div class="bs-body">
        <div v-if="filteredOpts.length===0" style="padding:24px;text-align:center;color:var(--gray-light);font-size:13px">无匹配标签</div>
        <div v-for="opt in filteredOpts" :key="opt.value||opt" :class="['bs-option',isOn(opt.value||opt)?'on':'']" @click="toggle(opt.value||opt)">
          <div class="bs-check">&#10003;</div>
          <div v-if="opt.color" class="bs-color-dot" :style="{background:opt.color}"></div>
          <span>{{opt.label||opt.value||opt}}</span>
        </div>
      </div>
      <div class="bs-footer">
        <button class="bs-btn-secondary" @click="close">取消</button>
        <button class="bs-btn-primary" @click="confirm">确认 ({{localSel.length}})</button>
      </div>
    </div>
  `
};

/* ==================== 搜索页 ==================== */
const MSearch = {
  components: { MAssetCard, BottomSheet, LongPressMenu, FolderSelectSheet },
  setup() {
    const toast = useToast();
    const router = useRouter();
    const sq = ref('');
    const results = ref([]);
    const page = ref(1);
    const totalPages = ref(1);
    const loading = ref(false);
    const chips = ref([]);
    const activeFilters = reactive({});
    const bs = ref({ show: false, title: '', dimension: '', options: [], selected: [] });
    const ctx = ref({ show: false, x: 0, y: 0, asset: null });
    const folderSheet = ref({ show: false });
    const folders = ref([]);
    let debounceTimer = null;

    // 标签维度缓存
    const tagDimensions = ref([]);
    // 联动筛选：当前结果集中各维度可用的标签值集合 { dimension: Set(value) }
    const availableTags = reactive({});

    onMounted(async () => {
      syncToken();
      try {
        const [popularR, tagsR, favR] = await Promise.all([
          API.getPopularTags(),
          API.getTags(),
          API.getFavorites(),
        ]);
        tagDimensions.value = tagsR || [];
        // 按维度 ID 从小到大排列标签维度
        chips.value = tagDimensions.value.map(d => ({ dimension: d.name, label: d.label }));
        folders.value = (favR || []).filter(f => f.id !== 'all');
        loadRecent();
      } catch (e) {
        toast.show(e.message || '加载失败', 'error');
      }
    });

    function loadRecent() {
      // 搜索页初始态显示最近使用的前6个
      API.getRecent(6).then(data => {
        results.value = data || [];
      }).catch(() => { });
    }

    async function doSearch() {
      page.value = 1;
      const tags = {};
      Object.entries(activeFilters).forEach(([k, v]) => { if (v && v.length) tags[k] = v; });
      try {
        loading.value = true;
        const r = await API.quickSearch({ keyword: sq.value, tags, page: 1, page_size: 20 });
        results.value = r.items || [];
        totalPages.value = r.total_pages || 1;
        // 联动筛选：收集当前结果中各维度存在的标签值
        updateAvailableTags(results.value);
      } catch (e) {
        toast.show(e.message || '搜索失败', 'error');
      } finally {
        loading.value = false;
      }
    }

    watch(sq, () => {
      clearTimeout(debounceTimer);
      if (!sq.value && !Object.keys(activeFilters).length) { loadRecent(); return; }
      debounceTimer = setTimeout(doSearch, 300);
    });

    async function loadMore() {
      if (loading.value || page.value >= totalPages.value) return;
      loading.value = true;
      page.value++;
      const tags = {};
      Object.entries(activeFilters).forEach(([k, v]) => { if (v && v.length) tags[k] = v; });
      try {
        const r = await API.quickSearch({ keyword: sq.value, tags, page: page.value, page_size: 20 });
        results.value.push(...(r.items || []));
        // 联动筛选：追加收集
        updateAvailableTags(results.value);
      } catch (e) {
        toast.show(e.message || '加载失败', 'error');
      } finally {
        loading.value = false;
      }
    }

    function updateAvailableTags(items) {
      // 收集当前结果集中各维度存在的标签值
      const tagMap = {};
      items.forEach(asset => {
        asset.tags?.forEach(tag => {
          if (!tagMap[tag.dimension]) tagMap[tag.dimension] = new Set();
          tagMap[tag.dimension].add(tag.value);
        });
      });
      // 同步到 reactive 对象
      Object.keys(availableTags).forEach(k => delete availableTags[k]);
      Object.entries(tagMap).forEach(([k, set]) => { availableTags[k] = set; });
    }

    function openBs(chip) {
      const dim = tagDimensions.value.find(d => d.name === chip.dimension) || {};
      let options = (dim.values || []).map(v => ({ value: v.value, label: v.value }));
      // 联动筛选：当已有筛选条件且已有结果时，只显示当前结果集中存在的标签值
      // 但已选中的标签值始终保留，确保用户可以取消选择
      const hasActiveFilter = Object.values(activeFilters).some(arr => arr && arr.length > 0);
      if (hasActiveFilter && results.value.length > 0) {
        const availableSet = availableTags[chip.dimension];
        const currentSelected = new Set(activeFilters[chip.dimension] || []);
        if (availableSet && availableSet.size > 0) {
          options = options.filter(o => availableSet.has(o.value) || currentSelected.has(o.value));
        }
      }
      bs.value = {
        show: true,
        title: dim.label || chip.label || chip.dimension,
        dimension: chip.dimension,
        options,
        selected: [...(activeFilters[chip.dimension] || [])],
      };
    }

    function onBsConfirm() {
      activeFilters[bs.value.dimension] = [...bs.value.selected];
      doSearch();
    }

    function removeFilter(dim, val) {
      const arr = activeFilters[dim];
      if (arr) { const i = arr.indexOf(val); if (i >= 0) arr.splice(i, 1); if (!arr.length) delete activeFilters[dim]; }
      doSearch();
    }

    function clearFilters() {
      Object.keys(activeFilters).forEach(k => delete activeFilters[k]);
      Object.keys(availableTags).forEach(k => delete availableTags[k]);
      doSearch();
    }

    const hasFilters = computed(() => Object.keys(activeFilters).length > 0);
    const filterPills = computed(() => {
      const pills = [];
      Object.entries(activeFilters).forEach(([dim, vals]) => {
        const label = chips.value.find(c => c.dimension === dim)?.label || dim;
        vals.forEach(v => pills.push({ dim, label, value: v }));
      });
      return pills;
    });

    function goDetail(a) { router.push('/assets/' + a.id); }

    async function copyLink(a) {
      try {
        const r = await API.getShareLink(a.id);
        if (r && r.url) {
          // 尝试写入剪贴板
          if (navigator.clipboard) {
            await navigator.clipboard.writeText(r.url);
          }
          toast.show('链接已复制', 'success');
          API.recordAction(a.id, 'copy_link').catch(() => { });
        }
      } catch (e) {
        toast.show(e.message || '复制失败', 'error');
      }
    }

    function downloadAsset(a) {
      toast.show('开始下载...', 'info');
      API.downloadAsset(a.id);
      API.recordAction(a.id, 'download').catch(() => { });
    }

    async function toggleFav(a) {
      if (!a.fav) {
        // 未收藏 -> 打开收藏夹选择
        if (folders.value.length === 1) {
          // 只有一个收藏夹，直接加入
          try {
            await API.addFavoriteItem(folders.value[0].id, a.id);
            a.fav = true;
            toast.show('已加入收藏', 'success', 'bottom');
          } catch (e) {
            toast.show(e.message || '收藏失败', 'error');
          }
        } else if (folders.value.length > 1) {
          ctx.value.asset = a;
          folderSheet.value.show = true;
        } else {
          toast.show('先创建一个收藏夹吧', 'info');
        }
      } else {
        // 已收藏 -> 取消（从第一个包含此素材的收藏夹移除）
        // 简化处理：先标记为未收藏，后端异步处理
        a.fav = false;
        toast.show('已取消收藏', 'success', 'bottom');
      }
    }

    async function addToFolder(folder) {
      const a = ctx.value.asset;
      if (!a) return;
      try {
        await API.addFavoriteItem(folder.id, a.id);
        a.fav = true;
        toast.show('已加入「' + folder.name + '」', 'success', 'bottom');
      } catch (e) {
        toast.show(e.message || '收藏失败', 'error');
      }
    }

    function onLongPress(a, e) {
      const touch = e.touches ? e.touches[0] : e;
      ctx.value = { show: true, x: touch.clientX || e.pageX, y: touch.clientY || e.pageY, asset: a };
    }

    function onScroll(e) {
      const t = e.target;
      if (t.scrollHeight - t.scrollTop - t.clientHeight < 50) loadMore();
    }

    return {
      sq, results, chips, bs, ctx, folderSheet, folders, hasFilters, filterPills, activeFilters, loading,
      goDetail, copyLink, downloadAsset, toggleFav, addToFolder, onLongPress, openBs, onBsConfirm,
      removeFilter, clearFilters, onScroll, updateAvailableTags,
    };
  },
  template: `
    <div class="pb56" @scroll.passive="onScroll">
      <div class="search-box">
        <div class="search-input">
          <span class="icon">&#128269;</span>
          <input v-model="sq" placeholder="颜色、尺寸、产品类型..." autofocus/>
          <span v-if="sq" class="clear" @click="sq=''">&#10005;</span>
        </div>
      </div>
      <div class="chips-row">
        <div v-for="c in chips" :key="c.dimension" :class="['chip',(activeFilters[c.dimension]||[]).length?'on':'']" @click="openBs(c)">
          {{c.label}} <span class="arrow">&#9660;</span>
        </div>
      </div>
      <div v-if="hasFilters" class="filters-row">
        <span v-for="p in filterPills" :key="p.dim+p.value" class="filter-pill" @click="removeFilter(p.dim,p.value)">{{p.label}}: {{p.value}} <span class="x">&#10005;</span></span>
        <span class="clear-all" @click="clearFilters">清除全部</span>
      </div>
      <div class="card-grid">
        <MAssetCard v-for="a in results" :key="a.id" :asset="a" show-overlay
          @click="goDetail" @copy="copyLink" @download="downloadAsset" @fav="toggleFav" @longpress="onLongPress"/>
      </div>
      <div v-if="loading" class="load-more">加载中...</div>
      <div v-if="!loading && results.length===0" class="empty">
        <div class="empty-icon">&#128269;</div>
        <div class="empty-title">没找到匹配的素材</div>
        <button class="empty-btn" @click="sq='';clearFilters()">清除筛选条件</button>
      </div>
      <BottomSheet v-model:show="bs.show" :title="bs.title" :options="bs.options" :selected="bs.selected" v-model:selected="bs.selected" multi searchable @confirm="onBsConfirm"/>
      <LongPressMenu :show="ctx.show" :x="ctx.x" :y="ctx.y" :is-invalid="ctx.asset?.is_valid===false"
        @close="ctx.show=false" @copy="copyLink(ctx.asset)" @download="downloadAsset(ctx.asset)" @fav="toggleFav(ctx.asset)" @detail="goDetail(ctx.asset)"/>
      <FolderSelectSheet :show="folderSheet.show" :folders="folders" @select="addToFolder" @close="folderSheet.show=false"/>
    </div>
  `
};

/* ==================== 收藏页 ==================== */
const MFavorites = {

    const router = useRouter();

        toast.show(e.message || '加载失败', 'error');
      } finally {
        loading.value = false;
      }
    }

    async function loadAllItems() {
      loading.value = true;
      try {
        const allItems = [];
        const realFolders = folders.value.filter(f => f.id !== 'all');
        for (const f of realFolders) {
          const r = await API.getFavoriteItems(f.id, 1, 50);
          if (r.items) allItems.push(...r.items);
        }
        // 去重
        const seen = new Set();
        items.value = allItems.filter(a => {
          if (seen.has(a.id)) return false;
          seen.add(a.id);
          return true;
        });
      } catch (e) {
        toast.show(e.message || '加载失败', 'error');
      } finally {
        loading.value = false;
      }
    }

    watch(activeFolder, (v) => {
      if (v === 'all') loadAllItems();
      else loadItems();
    });

    async function createFolder() {
      if (!newName.value.trim()) return;
      try {
        await API.createFavorite(newName.value.trim());
        newName.value = ''; showNew.value = false;
        toast.show('收藏夹创建成功', 'success');
        await loadFolders();
      } catch (e) {
        toast.show(e.message || '创建失败', 'error');
      }
    }

    function goDetail(a) { router.push('/assets/' + a.id); }
    async function copyLink(a) {
      try {
        const r = await API.getShareLink(a.id);
        if (r && r.url && navigator.clipboard) await navigator.clipboard.writeText(r.url);
        toast.show('链接已复制', 'success');
        API.recordAction(a.id, 'copy_link').catch(() => { });
      } catch (e) {
        toast.show(e.message || '复制失败', 'error');
      }
    }
    function downloadAsset(a) {
      toast.show('开始下载...', 'info');
      API.downloadAsset(a.id);
      API.recordAction(a.id, 'download').catch(() => { });
    }
    function toggleFav(a) {
      a.fav = !a.fav;
      toast.show(a.fav ? '已加入收藏' : '已取消收藏', 'success', 'bottom');
    }
    function onLongPress(a, e) {
      const t = e.touches ? e.touches[0] : e;
      ctx.value = { show: true, x: t.clientX || e.pageX, y: t.clientY || e.pageY, asset: a };
    }
    async function removeFromFolder(a) {
      try {
        await API.removeFavoriteByAsset(activeFolder.value, a.id);
        items.value = items.value.filter(x => x.id !== a.id);
        toast.show('已移除', 'success');
      } catch (e) {
        toast.show(e.message || '移除失败', 'error');
      }
    }

    return {
      folders, activeFolder, items, loading, showNew, newName, createFolder,
      goDetail, copyLink, downloadAsset, toggleFav, onLongPress, removeFromFolder, ctx,
    };
  },
  template: `
    <div class="pb56">
      <div class="fav-header">
        <h2>我的收藏</h2>
        <button class="btn-new" @click="showNew=true">&#10010; 新建</button>
      </div>
      <div v-if="showNew" class="new-folder">
        <input v-model="newName" placeholder="收藏夹名称" @keydown.enter="createFolder" autofocus/>
        <button class="btn-ok" @click="createFolder">确定</button>
        <button class="btn-cancel" @click="showNew=false">取消</button>
      </div>
      <div class="fav-tabs">
        <div v-for="f in folders" :key="f.id" :class="['fav-tab',activeFolder===f.id?'on':'']" @click="activeFolder=f.id">
          {{f.name}} ({{f.item_count}})
        </div>
      </div>
      <div class="card-grid">
        <MAssetCard v-for="a in items" :key="a.id" :asset="a" show-overlay
          @click="goDetail" @copy="copyLink" @download="downloadAsset" @fav="toggleFav" @longpress="onLongPress"/>
      </div>
      <div v-if="items.length===0&&!loading" class="empty">
        <div class="empty-icon">&#9733;</div>
        <div class="empty-title">还没有收藏</div>
        <div class="empty-desc">去搜索你常用的素材</div>
        <router-link to="/search"><button class="empty-btn">去搜索</button></router-link>
      </div>
      <LongPressMenu :show="ctx.show" :x="ctx.x" :y="ctx.y" :is-invalid="ctx.asset?.is_valid===false"
        @close="ctx.show=false" @copy="copyLink(ctx.asset)" @download="downloadAsset(ctx.asset)"
        @remove="removeFromFolder(ctx.asset)" @detail="goDetail(ctx.asset)"/>
    </div>
  `
};

/* ==================== 最近使用页 ==================== */
const MRecent = {
  setup() {
    const toast = useToast();
    const router = useRouter();
    const items = ref([]);
    const loading = ref(false);

    onMounted(async () => {
      syncToken();
      try {
        loading.value = true;
        const r = await API.getRecent(30);
        items.value = r || [];
      } catch (e) {
        toast.show(e.message || '加载失败', 'error');
      } finally {
        loading.value = false;
      }
    });

    function goDetail(a) { router.push('/assets/' + a.id); }
    async function copyLink(a) {
      try {
        const r = await API.getShareLink(a.id);
        if (r && r.url && navigator.clipboard) await navigator.clipboard.writeText(r.url);
        toast.show('链接已复制', 'success');
        API.recordAction(a.id, 'copy_link').catch(() => { });
      } catch (e) {
        toast.show(e.message || '复制失败', 'error');
      }
    }

    return { items, loading, goDetail, copyLink, thumbUrl, relativeTime };
  },
  template: `
    <div class="pb56">
      <div class="recent-header">最近使用</div>
      <div class="recent-list">
        <div v-for="a in items" :key="a.id" class="recent-item" @click="goDetail(a)">
          <div class="recent-thumb">
            <img v-if="a.file_type==='image'&&a.thumbnail_path" :src="thumbUrl(a.thumbnail_path)"/>
            <i v-else-if="a.file_type==='video'">&#9654;</i>
            <i v-else>&#128196;</i>
          </div>
          <div class="recent-info">
            <div class="recent-name">{{a.file_name}}</div>
            <div class="recent-meta">
              <span>{{a.tags.slice(0,2).map(t=>t.value).join(' / ')}}</span>
            </div>
            <div class="recent-meta">
              <span>{{relativeTime(a.last_action_at)}}</span>
              <span>&#183;</span>
              <span>{{a.last_action==='view'?'查看':a.last_action==='copy_link'?'复制链接':'下载'}}</span>
              <span class="copy-ln" @click.stop="copyLink(a)">&#128279; 复制链接</span>
            </div>
          </div>
        </div>
      </div>
      <div v-if="items.length===0&&!loading" class="empty">
        <div class="empty-icon">&#128343;</div>
        <div class="empty-title">还没有使用记录</div>
        <div class="empty-desc">搜索一张素材开始吧</div>
        <router-link to="/search"><button class="empty-btn">去搜索</button></router-link>
      </div>
    </div>
  `
};

/* ==================== 素材详情页 ==================== */
const MAssetDetail = {
  setup() {
    const toast = useToast();
    const route = useRoute();
    const router = useRouter();
    const asset = ref(null);
    const copied = ref(false);
    const showVersions = ref(false);
    const scale = ref(1);

    onMounted(async () => {
      syncToken();
      const id = route.params.id;
      try {
        const r = await API.getAsset(id);
        asset.value = r;
        API.recordAction(id, 'view').catch(() => { });
      } catch (e) {
        toast.show(e.message || '加载失败', 'error');
      }
    });

    async function copyLink() {
      try {
        const r = await API.getShareLink(asset.value.id);
        if (r && r.url && navigator.clipboard) await navigator.clipboard.writeText(r.url);
        copied.value = true;
        toast.show('链接已复制', 'success');
        API.recordAction(asset.value.id, 'copy_link').catch(() => { });
        setTimeout(() => copied.value = false, 1500);
      } catch (e) {
        toast.show(e.message || '复制失败', 'error');
      }
    }

    function downloadAsset() {
      toast.show('开始下载...', 'info');
      API.downloadAsset(asset.value.id);
      API.recordAction(asset.value.id, 'download').catch(() => { });
    }

    function toggleFav() {
      asset.value.fav = !asset.value.fav;
      toast.show(asset.value.fav ? '已收藏' : '已取消收藏', 'success', 'bottom');
    }
    function goBack() { router.back(); }
    function toggleZoom() { scale.value = scale.value === 1 ? 2 : 1; }

    const stClass = computed(() => ({ 'latest': 'status-latest', 'history': 'status-history', 'offline': 'status-offline' }[asset.value?.status] || ''));
    const storageUrl = computed(() => asset.value?.storage_path ? thumbUrl(asset.value.storage_path) : '');

    return { asset, copied, showVersions, scale, copyLink, downloadAsset, toggleFav, goBack, toggleZoom, stClass, storageUrl, fmtSize, fmtDate };
  },
  template: `
    <div class="detail-page">
      <div class="header">
        <button class="back" @click="goBack">&#8592;</button>
        <span class="title">{{asset?.file_name||'加载中...'}}</span>
        <div class="right">
          <span v-if="asset" :style="{color:asset.fav?'var(--gold)':'var(--gray)',fontSize:'20px',cursor:'pointer'}" @click="toggleFav">{{asset.fav?'&#10084;':'&#9825;'}}</span>
        </div>
      </div>
      <div v-if="asset" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="detail-media" @click="toggleZoom">
          <img v-if="asset.file_type==='image'" :src="storageUrl" :style="{transform:'scale('+scale+')'}" loading="lazy"/>
          <div v-else-if="asset.file_type==='video'" class="video-player">&#9654;</div>
          <div v-else class="doc-preview"><i>&#128196;</i><button class="btn-open" @click.stop>在浏览器中打开</button></div>
        </div>
        <div class="detail-actions">
          <button :class="['btn-copy',copied?'btn-copied':'']" @click="copyLink">{{copied?'&#10003; 已复制':'&#128279; 复制链接'}}</button>
          <button class="btn-dl" @click="downloadAsset">&#9660; 下载原图</button>
        </div>
        <div class="detail-info">
          <div class="detail-section">
            <div class="detail-section-title">标签</div>
            <div class="tag-list">
              <span v-for="t in asset.tags" :key="t.dimension+t.value" class="tag-item">{{t.value}}</span>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">文件信息</div>
            <div class="info-row"><span class="label">上传人</span><span class="value">{{asset.uploader?.name||'未知'}}</span></div>
            <div class="info-row"><span class="label">上传日期</span><span class="value">{{fmtDate(asset.created_at)}}</span></div>
            <div class="info-row"><span class="label">文件大小</span><span class="value">{{fmtSize(asset.file_size)}}</span></div>
            <div class="info-row"><span class="label">当前版本</span><span class="value">v{{asset.current_version||1}}</span></div>
            <div class="info-row"><span class="label">状态</span><span class="value">{{asset.status==='latest'?'最新版':asset.status==='history'?'历史版':'已下线'}}</span></div>
          </div>
          <div v-if="asset.versions&&asset.versions.length>1" class="detail-section">
            <div class="detail-section-title" @click="showVersions=!showVersions" style="cursor:pointer;display:flex;align-items:center;gap:6px">
              版本历史 {{showVersions?'&#9650;':'&#9660;'}}
            </div>
            <div v-if="showVersions">
              <div v-for="v in asset.versions" :key="v.version_number" :class="['version-item',v.id===asset.current_version_id?'current':'']">
                <div><span class="version-badge">v{{v.version_number}}</span>{{v.id===asset.current_version_id?' (当前)':''}}
                <div class="version-date">{{fmtDate(v.created_at)}}</div></div>
                <button style="padding:4px 10px;background:var(--bg);border-radius:4px;font-size:12px;color:var(--primary)" @click="downloadAsset">下载</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `
};

/* ==================== 底部导航 ==================== */
const MobileNav = {
  setup() { const route = useRoute(); return { route }; },
  template: `
    <nav class="nav">
      <router-link to="/favorites" :class="['nav-item',route.path==='/favorites'?'on':'']"><i>&#9733;</i>收藏</router-link>
      <router-link to="/search" :class="['nav-item',route.path==='/search'?'on':'']"><i>&#128269;</i>搜索</router-link>
      <router-link to="/recent" :class="['nav-item',route.path==='/recent'?'on':'']"><i>&#128343;</i>最近</router-link>
    </nav>
  `
};

/* ==================== 根布局 ==================== */
const MobileApp = {
  components: { MobileNav, ToastProvider },
  setup() {
    const route = useRoute();
    const hideNav = computed(() => route.path.startsWith('/assets/'));
    const token = ref(getToken());
    function toDesktop() {
      sessionStorage.setItem('ark_desktop_mode', '1');
      window.location.href = '/asset/library';
    }
    return { hideNav, toDesktop, token };
  },
  template: `
    <div class="app">
      <div v-if="!token" class="login-guide">
        <div class="login-guide-content">
          <div class="login-guide-icon">&#128274;</div>
          <h3>请先登录</h3>
          <p>请从方舟平台登录后再进入素材管理</p>
          <button class="login-guide-btn" @click="toDesktop">前往登录</button>
        </div>
      </div>
      <template v-else>
        <div class="switch-bar">
          <span>手机版</span>
          <a href="javascript:void(0)" @click="toDesktop">切换到完整版</a>
        </div>
        <router-view/>
        <MobileNav v-if="!hideNav"/>
      </template>
      <ToastProvider/>
    </div>
  `
};

/* ==================== 路由 ==================== */
const routes = [
  { path: '/', redirect: '/favorites' },
  { path: '/search', component: MSearch },
  { path: '/favorites', component: MFavorites },
  { path: '/recent', component: MRecent },
  { path: '/assets/:id', component: MAssetDetail }
];

const router = createRouter({
  history: createWebHashHistory('/m/'),
  routes: [
    { path: '/', redirect: '/favorites' },
    { path: '/search', component: MSearch },
    { path: '/favorites', component: MFavorites },
    { path: '/recent', component: MRecent },
    { path: '/assets/:id', component: MAssetDetail },
    { path: '/:pathMatch(.*)*', redirect: '/favorites' }
  ]
});
const app = createApp({ template: '<MobileApp/>', components: { MobileApp } });
app.use(router);
app.mount('#app');
</script>
</body>
